---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server-oauth2-proxy
  namespace: code-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: code-server-oauth2-proxy
  template:
    metadata:
      labels:
        app: code-server-oauth2-proxy
    spec:
      containers:
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args:
            - --provider=oidc
            - --oidc-issuer-url=https://auth.armleth.fr/realms/infrastructure
            - --client-id=code-server
            - --redirect-url=https://dev.armleth.fr/oauth2/callback
            - --email-domain=*
            - --http-address=0.0.0.0:4180
            - --reverse-proxy=true
            - --skip-provider-button=true
            - --allowed-group=admins
            - --cookie-secure=true
            - --upstream=http://code-server-service.code-server.svc.cluster.local:8080
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: code-server-oidc-secret
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: code-server-oidc-secret
                  key: cookie-secret
          resources:
            requests:
              memory: 16Mi
              cpu: 5m
            limits:
              memory: 32Mi
          ports:
            - containerPort: 4180
              name: http
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 10
            periodSeconds: 30
