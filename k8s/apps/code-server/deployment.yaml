---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-data
  namespace: code-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      initContainers:
        - name: fix-permissions
          image: busybox
          command: ["/bin/sh", "-c"]
          args:
            - chown -R 1000:1000 /data
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: lathibandolaise-code
              mountPath: /data
      containers:
        - name: code-server
          image: codercom/code-server:4.115.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              sudo apt-get update -qq > /dev/null 2>&1
              sudo apt-get install -y -qq php-cli php-pgsql composer > /dev/null 2>&1
              if ! ls ~/.local/share/code-server/extensions/bmewburn.vscode-intelephense-client-* > /dev/null 2>&1; then
                curl -sL --compressed -o /tmp/intelephense.vsix "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/bmewburn/vsextensions/vscode-intelephense-client/1.16.5/vspackage" \
                  && code-server --install-extension /tmp/intelephense.vsix > /dev/null 2>&1 \
                  && rm -f /tmp/intelephense.vsix || true
              fi
              exec code-server \
                --auth=none \
                --bind-addr=0.0.0.0:8080 \
                --disable-telemetry \
                --disable-getting-started-override
          env:
            - name: GIT_AUTHOR_NAME
              value: "Armleth"
            - name: GIT_AUTHOR_EMAIL
              value: "armleth@proton.me"
            - name: GIT_COMMITTER_NAME
              value: "Armleth"
            - name: GIT_COMMITTER_EMAIL
              value: "armleth@proton.me"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/coder
            - name: lathibandolaise-code
              mountPath: /home/coder/lathibandolaise
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-data
        - name: lathibandolaise-code
          hostPath:
            path: /data/lathibandolaise
            type: DirectoryOrCreate
