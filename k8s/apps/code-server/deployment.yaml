---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-data
  namespace: code-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      initContainers:
        - name: install-bun
          image: oven/bun:alpine
          command: ["/bin/sh", "-c"]
          args:
            - cp /usr/local/bin/bun /bun-bin/bun
          volumeMounts:
            - name: bun-bin
              mountPath: /bun-bin
      containers:
        - name: code-server
          image: codercom/code-server:4.115.0
          args:
            - --auth=none
            - --bind-addr=0.0.0.0:8080
            - --disable-telemetry
            - --disable-getting-started-override
          env:
            - name: PATH
              value: "/opt/bun:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            - name: GIT_AUTHOR_NAME
              value: "Armleth"
            - name: GIT_AUTHOR_EMAIL
              value: "armleth@proton.me"
            - name: GIT_COMMITTER_NAME
              value: "Armleth"
            - name: GIT_COMMITTER_EMAIL
              value: "armleth@proton.me"
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /home/coder
            - name: lathibandolaise-code
              mountPath: /home/coder/lathibandolaise
            - name: bun-bin
              mountPath: /opt/bun
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-data
        - name: lathibandolaise-code
          hostPath:
            path: /data/lathibandolaise
            type: DirectoryOrCreate
        - name: bun-bin
          emptyDir: {}
