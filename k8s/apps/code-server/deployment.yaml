---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: code-server-data
  namespace: code-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-server
  namespace: code-server
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app: code-server
  template:
    metadata:
      labels:
        app: code-server
    spec:
      initContainers:
        - name: git-bootstrap
          image: alpine/git
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              git config --global --add safe.directory /workspace/lathibandolaise
              TOKEN=$(cat /var/run/secrets/git/token)
              if [ ! -d /workspace/lathibandolaise/.git ]; then
                git clone \
                  "https://oauth2:${TOKEN}@github.com/armleth/lathibandolaise.git" \
                  /workspace/lathibandolaise
              fi
              git -C /workspace/lathibandolaise remote set-url origin \
                https://github.com/armleth/lathibandolaise.git
              cat > /home/coder/.gitconfig <<'GITCONFIG'
              [user]
                  name = armleth
                  email = armleth@proton.me
              [credential]
                  helper = store
              [init]
                  defaultBranch = main
              GITCONFIG
              printf 'https://oauth2:%s@github.com\n' "$TOKEN" > /home/coder/.git-credentials
              chmod 600 /home/coder/.git-credentials
              chown -R 1000:1000 /workspace/lathibandolaise /home/coder
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: lathibandolaise-code
              mountPath: /workspace/lathibandolaise
            - name: data
              mountPath: /home/coder
            - name: git-secret
              mountPath: /var/run/secrets/git
              readOnly: true
      containers:
        - name: code-server
          image: codercom/code-server:4.115.0
          command: ["/bin/sh", "-c"]
          args:
            - |
              sudo apt-get update -qq > /dev/null 2>&1
              sudo apt-get install -y -qq php-cli php-pgsql composer npm > /dev/null 2>&1
              if ! ls ~/.local/share/code-server/extensions/bmewburn.vscode-intelephense-client-* > /dev/null 2>&1; then
                curl -sL --compressed -o /tmp/intelephense.vsix "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/bmewburn/vsextensions/vscode-intelephense-client/1.16.5/vspackage" \
                  && code-server --install-extension /tmp/intelephense.vsix > /dev/null 2>&1 \
                  && rm -f /tmp/intelephense.vsix || true
              fi
              if ! ls ~/.local/share/code-server/extensions/esbenp.prettier-vscode-* > /dev/null 2>&1; then
                curl -sL --compressed -o /tmp/prettier.vsix "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/esbenp/vsextensions/prettier-vscode/11.0.0/vspackage" \
                  && code-server --install-extension /tmp/prettier.vsix > /dev/null 2>&1 \
                  && rm -f /tmp/prettier.vsix || true
              fi
              if ! ls ~/.local/share/code-server/extensions/rifi2k.format-html-in-php-* > /dev/null 2>&1; then
                curl -sL --compressed -o /tmp/format-html-in-php.vsix "https://marketplace.visualstudio.com/_apis/public/gallery/publishers/rifi2k/vsextensions/format-html-in-php/1.7.0/vspackage" \
                  && code-server --install-extension /tmp/format-html-in-php.vsix > /dev/null 2>&1 \
                  && rm -f /tmp/format-html-in-php.vsix || true
              fi
              if [ -f /home/coder/lathibandolaise/package.json ] && [ ! -d /home/coder/lathibandolaise/node_modules ]; then
                cd /home/coder/lathibandolaise && npm install > /dev/null 2>&1
              fi
              exec code-server \
                --auth=none \
                --bind-addr=0.0.0.0:8080 \
                --disable-telemetry \
                --disable-getting-started-override
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /home/coder
            - name: lathibandolaise-code
              mountPath: /home/coder/lathibandolaise
          startupProbe:
            httpGet:
              path: /healthz
              port: 8080
            failureThreshold: 60
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: code-server-data
        - name: lathibandolaise-code
          hostPath:
            path: /data/lathibandolaise
            type: DirectoryOrCreate
        - name: git-secret
          projected:
            defaultMode: 0400
            sources:
              - secret:
                  name: code-server-git-secret
