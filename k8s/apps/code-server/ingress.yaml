---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: code-server-ingress
  namespace: code-server
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`dev.armleth.fr`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
    - match: Host(`dev.armleth.fr`)
      kind: Rule
      priority: 10
      services:
        - name: code-server-service
          port: 8080
      middlewares:
        - name: authentik-forward-auth
          namespace: authentik
  tls:
    secretName: code-server-tls-secret
