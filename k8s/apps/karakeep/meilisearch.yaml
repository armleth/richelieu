---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: karakeep-meilisearch
  namespace: karakeep
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: karakeep-meilisearch
  template:
    metadata:
      labels:
        app: karakeep-meilisearch
    spec:
      containers:
        - name: meilisearch
          image: getmeili/meilisearch:v1.41.0
          ports:
            - containerPort: 7700
              name: http
          env:
            - name: MEILI_NO_ANALYTICS
              value: "true"
            - name: MEILI_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: karakeep-secret
                  key: MEILI_MASTER_KEY
          volumeMounts:
            - name: data
              mountPath: /meili_data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: karakeep-meilisearch-data
---
apiVersion: v1
kind: Service
metadata:
  name: karakeep-meilisearch-service
  namespace: karakeep
spec:
  selector:
    app: karakeep-meilisearch
  ports:
    - protocol: TCP
      port: 7700
      targetPort: 7700
