---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: actual-budget-ingress
  namespace: actual-budget
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`finances.armleth.fr`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
    - match: Host(`finances.armleth.fr`)
      kind: Rule
      priority: 10
      services:
        - name: actual-budget-service
          port: 5006
      middlewares:
        - name: authentik-forward-auth
          namespace: authentik
  tls:
    secretName: actual-budget-tls-secret
