---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: actual-budget
  namespace: actual-budget
spec:
  replicas: 1
  selector:
    matchLabels:
      app: actual-budget
  template:
    metadata:
      labels:
        app: actual-budget
    spec:
      containers:
        - name: actual-budget
          image: actualbudget/actual-server:latest
          ports:
            - containerPort: 5006
          env:
            - name: ACTUAL_LOGIN_METHOD
              value: openid
            - name: ACTUAL_OPENID_DISCOVERY_URL
              value: https://auth.armleth.fr/application/o/actual-budget/.well-known/openid-configuration
            - name: ACTUAL_OPENID_CLIENT_ID
              value: actual-budget
            - name: ACTUAL_OPENID_SERVER_HOSTNAME
              value: https://finances.armleth.fr
            - name: ACTUAL_TRUSTED_PROXIES
              value: loopback,linklocal,uniquelocal
          envFrom:
            - secretRef:
                name: actual-budget-oidc
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: actual-budget-data
