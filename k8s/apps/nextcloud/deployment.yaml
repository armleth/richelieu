---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nextcloud
  namespace: nextcloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nextcloud
  template:
    metadata:
      labels:
        app: nextcloud
    spec:
      initContainers:
        - name: fix-media-permissions
          image: busybox
          command: ["sh", "-c", "chown 33:33 /media"]
          volumeMounts:
            - name: jellyfin-media
              mountPath: /media
      containers:
        - name: nextcloud
          image: nextcloud:33-apache
          ports:
            - containerPort: 80
              name: http
          env:
            - name: POSTGRES_HOST
              value: nextcloud-pg-rw
            - name: POSTGRES_DB
              value: nextcloud
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-db-secret
                  key: password
            - name: NEXTCLOUD_ADMIN_USER
              value: admin
            - name: NEXTCLOUD_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-admin-secret
                  key: admin-password
            - name: NEXTCLOUD_TRUSTED_DOMAINS
              value: nextcloud.armleth.fr
            - name: REDIS_HOST
              value: nextcloud-redis-service
            - name: OVERWRITEPROTOCOL
              value: https
            - name: TRUSTED_PROXIES
              value: 10.0.0.0/8
          resources:
            requests:
              memory: 512Mi
              cpu: 50m
            limits:
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/www/html
            - name: jellyfin-media
              mountPath: /media
            - name: nextcloud-extra-config
              mountPath: /var/www/html/config/disable-bruteforce.config.php
              subPath: disable-bruteforce.config.php
          # /status.php exercises the full PHP-FPM + Apache prefork +
          # Postgres + Redis path, so when the host is under load the
          # request occasionally takes >1s and the kubelet's default
          # 1s probe timeout makes it look unhealthy. With 87 spurious
          # restarts already, give the probe more slack: 10s timeout
          # and a higher failure threshold so a transient slowdown
          # doesn't trigger an Apache SIGWINCH (graceful shutdown ->
          # pod restart).
          readinessProbe:
            httpGet:
              path: /status.php
              port: 80
              httpHeaders:
                - name: Host
                  value: nextcloud.armleth.fr
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /status.php
              port: 80
              httpHeaders:
                - name: Host
                  value: nextcloud.armleth.fr
            initialDelaySeconds: 60
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: nextcloud-data
        - name: jellyfin-media
          hostPath:
            path: /data/media
            type: DirectoryOrCreate
        - name: nextcloud-extra-config
          configMap:
            name: nextcloud-extra-config
