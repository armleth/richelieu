---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress
  namespace: homepage
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.armleth.fr`)
      kind: Rule
      services:
        - name: homepage-service
          port: 3000
      middlewares:
        - name: authentik-forward-auth
          namespace: authentik
  tls:
    secretName: homepage-tls-secret
