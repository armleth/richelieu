---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: homepage-ingress
  namespace: homepage
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`home.armleth.fr`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
    - match: Host(`home.armleth.fr`)
      kind: Rule
      priority: 10
      services:
        - name: homepage-service
          port: 3000
      middlewares:
        - name: authentik-forward-auth
          namespace: authentik
  tls:
    secretName: homepage-tls-secret
