---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: homepage-oidc-secret
  namespace: homepage
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: homepage-oidc-secret
  data:
    - secretKey: client-secret
      remoteRef:
        key: secret/homepage
        property: oidc-client-secret
    - secretKey: cookie-secret
      remoteRef:
        key: secret/homepage
        property: cookie-secret
