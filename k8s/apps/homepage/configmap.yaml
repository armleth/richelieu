---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-config
  namespace: homepage
data:
  kubernetes.yaml: |
    mode: cluster

  settings.yaml: |
    title: Richelieu
    theme: dark
    color: slate

  widgets.yaml: |
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "cluster"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - resources:
        label: "Disk"
        disk: /host-root

  services.yaml: |
    - Media:
        - Jellyfin:
            icon: jellyfin.png
            href: https://media.armleth.fr
            description: Media server
            namespace: media
            app: jellyfin
            podSelector: "app=jellyfin"
        - Radarr:
            icon: radarr.png
            href: https://movies.media.armleth.fr
            description: Movie manager
            namespace: media
            app: radarr
            podSelector: "app=radarr"
        - Sonarr:
            icon: sonarr.png
            href: https://series.media.armleth.fr
            description: TV show manager
            namespace: media
            app: sonarr
            podSelector: "app=sonarr"
        - Bazarr:
            icon: bazarr.png
            href: https://subtitles.media.armleth.fr
            description: Subtitle manager
            namespace: media
            app: bazarr
            podSelector: "app=bazarr"
        - Prowlarr:
            icon: prowlarr.png
            href: https://trackers.media.armleth.fr
            description: Indexer manager
            namespace: media
            app: prowlarr
            podSelector: "app=prowlarr"
        - qBittorrent:
            icon: qbittorrent.png
            href: https://torrents.media.armleth.fr
            description: Torrent client
            namespace: media
            app: qbittorrent
            podSelector: "app=qbittorrent"
        - Flood:
            icon: flood.png
            href: https://downloads.media.armleth.fr
            description: Torrent UI
            namespace: media
            app: flood
            podSelector: "app=flood"
        - FlareSolverr:
            icon: flaresolverr.png
            description: Cloudflare bypass
            namespace: media
            app: flaresolverr
            podSelector: "app=flaresolverr"
    - Infrastructure:
        - ArgoCD:
            icon: argo-cd.png
            href: https://argocd.armleth.fr
            description: GitOps deployment
            namespace: argocd
            app: argocd-server
            podSelector: "app.kubernetes.io/name=argocd-server"
        - Vault:
            icon: vault.png
            href: https://vault.armleth.fr
            description: Secrets management
            namespace: vault
            app: vault
            podSelector: "app.kubernetes.io/name=vault"
        - Authentik:
            icon: authentik.png
            href: https://auth.armleth.fr
            description: Identity provider
            namespace: authentik
            app: authentik-server
            podSelector: "app=authentik-server"
        - Grafana:
            icon: grafana.png
            href: https://metrics.armleth.fr
            description: Metrics & dashboards
            namespace: monitoring
            app: grafana
            podSelector: "app.kubernetes.io/name=grafana"

    - Services:
        - Homepage:
            icon: homepage.png
            href: https://home.armleth.fr
            description: Dashboard
            namespace: homepage
            app: homepage
            podSelector: "app=homepage"
        - Nextcloud:
            icon: nextcloud.png
            href: https://nextcloud.armleth.fr
            description: File sync & sharing
            namespace: nextcloud
            app: nextcloud
            podSelector: "app=nextcloud"
        - Bbox:
            icon: router.png
            href: https://bbox.armleth.fr
            description: Router admin
            namespace: bbox
            app: bbox-proxy
            podSelector: "app=bbox-proxy"
        - Actual Budget:
            icon: actual-budget.png
            href: https://finances.armleth.fr
            description: Personal finance manager
            namespace: actual-budget
            app: actual-budget
            podSelector: "app=actual-budget"

    - Dev:
        - Code Server:
            icon: code-server.png
            href: https://dev.armleth.fr
            description: Browser IDE
            namespace: code-server
            app: code-server
            podSelector: "app=code-server"
        - Lathibandolaise Test:
            icon: php.png
            href: https://test.lathibandolaise.dev.armleth.fr
            description: Lathibandolaise (test)
            namespace: lathibandolaise
            app: lathibandolaise-test
            podSelector: "app=lathibandolaise-test"
        - Lathibandolaise Prod:
            icon: php.png
            href: https://prod.lathibandolaise.dev.armleth.fr
            description: Lathibandolaise (prod)
            namespace: lathibandolaise
            app: lathibandolaise-prod
            podSelector: "app=lathibandolaise-prod"
        - DbGate:
            icon: mdi-database
            href: https://db.lathibandolaise.dev.armleth.fr
            description: Database visualizer
            namespace: lathibandolaise
            app: dbgate
            podSelector: "app=dbgate"

  docker.yaml: |

  bookmarks.yaml: |
