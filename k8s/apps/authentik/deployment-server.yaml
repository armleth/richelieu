apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      containers:
        - name: authentik
          image: ghcr.io/goauthentik/server:2025.12.4
          args: ["server"]
          ports:
            - containerPort: 9000
              name: http
          env:
            - name: AUTHENTIK_WEB__WORKERS
              value: "1"
            - name: AUTHENTIK_WEB__THREADS
              value: "1"
            - name: AUTHENTIK_LOG_LEVEL
              value: "warning"
            - name: AUTHENTIK_DISABLE_UPDATE_CHECK
              value: "true"
            - name: AUTHENTIK_DISABLE_STARTUP_ANALYTICS
              value: "true"
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_AVATARS
              value: "initials"
            - name: AUTHENTIK_OUTPOSTS__DISCOVER
              value: "false"
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-pg-rw
            - name: AUTHENTIK_POSTGRESQL__PORT
              value: "5432"
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-db-secret
                  key: password
            - name: AUTHENTIK_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: secret-key
            - name: AUTHENTIK_BOOTSTRAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: authentik-secret
                  key: admin-password
          resources:
            requests:
              memory: 200Mi
              cpu: 50m
            limits:
              memory: 500Mi
          readinessProbe:
            httpGet:
              path: /-/health/ready/
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/health/live/
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 30
