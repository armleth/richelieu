---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jellyfin
  namespace: media
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jellyfin
  template:
    metadata:
      labels:
        app: jellyfin
    spec:
      containers:
        - name: jellyfin
          image: jellyfin/jellyfin:latest
          securityContext:
            privileged: true
          env:
            - name: DOTNET_GCConserveMemory
              value: "9"
            - name: DOTNET_gcServer
              value: "0"
            - name: MALLOC_TRIM_THRESHOLD_
              value: "131072"
          ports:
            - containerPort: 8096
              name: http
          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 1Gi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media
            - name: downloads
              mountPath: /downloads
            - name: dri
              mountPath: /dev/dri
          readinessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8096
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: jellyfin-config
        - name: media
          hostPath:
            path: /data/media
            type: DirectoryOrCreate
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads
        - name: dri
          hostPath:
            path: /dev/dri
