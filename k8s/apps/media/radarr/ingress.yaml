---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr-ingress
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`movies.media.armleth.fr`)
      kind: Rule
      services:
        - name: radarr-service
          port: 7878
  tls:
    secretName: radarr-tls-secret
