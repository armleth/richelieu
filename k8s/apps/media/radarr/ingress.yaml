---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: radarr-ingress
  namespace: media
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`movies.media.armleth.fr`) && PathPrefix(`/outpost.goauthentik.io/`)
      kind: Rule
      priority: 15
      services:
        - name: authentik-server
          namespace: authentik
          port: 80
    - match: Host(`movies.media.armleth.fr`)
      kind: Rule
      priority: 10
      services:
        - name: radarr-service
          port: 7878
      middlewares:
        - name: authentik-forward-auth
          namespace: authentik
        - name: arr-local-client-ip
  tls:
    secretName: radarr-tls-secret
