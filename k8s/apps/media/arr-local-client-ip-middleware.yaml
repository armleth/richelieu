---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: arr-local-client-ip
  namespace: media
spec:
  # Rewrites X-Forwarded-For to a loopback value before the request reaches
  # Sonarr/Radarr/Prowlarr/Bazarr. These apps trust XFF when the TCP peer is
  # in an RFC1918 range (Traefik's pod IP qualifies) and key their
  # AuthenticationRequired=DisabledForLocalAddresses bypass off the rewritten
  # value. Once Traefik switched to externalTrafficPolicy: Local for
  # Nextcloud's bruteforce throttle, XFF carries the real client IP -- which
  # is no longer "local", so the bypass stops firing. This middleware MUST
  # chain AFTER authentik-forward-auth so Authentik still sees the real
  # client IP for its own bruteforce/policy logic.
  headers:
    customRequestHeaders:
      X-Forwarded-For: "127.0.0.1"
      X-Real-IP: "127.0.0.1"
