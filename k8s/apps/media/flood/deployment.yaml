---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flood
  namespace: media
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: flood
  template:
    metadata:
      labels:
        app: flood
    spec:
      containers:
        - name: flood
          image: jesec/flood:4.8.2
          args:
            - --allowedpath
            - /downloads
          env:
            - name: HOME
              value: "/config"
          ports:
            - containerPort: 3000
              name: http
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 256Mi
          volumeMounts:
            - name: config
              mountPath: /config
            - name: downloads
              mountPath: /downloads
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 30
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: flood-config
        - name: downloads
          persistentVolumeClaim:
            claimName: media-downloads
