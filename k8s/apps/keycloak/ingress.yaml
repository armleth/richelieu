apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: keycloak-ingress
  namespace: keycloak
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`keycloak.armleth.fr`)
      kind: Rule
      services:
        - name: keycloak
          port: 80
  tls:
    secretName: keycloak-tls-secret
