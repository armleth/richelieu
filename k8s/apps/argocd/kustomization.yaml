apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/v3.3.2/manifests/install.yaml
  - ingress.yaml
  - templates/

patches:
  - path: patches/patch-argocd-cm.yaml
  - path: patches/patch-argocd-cmd-params-cm.yaml
  - path: patches/patch-argocd-rbac-cm.yaml
  - path: patches/patch-disable-dex.yaml
  - path: patches/patch-argocd-resources.yaml
