apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bbox
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/armleth/richelieu.git
    targetRevision: HEAD
    path: k8s/apps/bbox
  destination:
    server: https://kubernetes.default.svc
    namespace: bbox
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
