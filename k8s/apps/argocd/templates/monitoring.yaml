apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 66.3.1
    helm:
      values: |
        alertmanager:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        defaultRules:
          rules:
            alertmanager: false
            kubeControllerManager: false
            kubeScheduler: false
            kubeProxy: false
            etcd: false
        prometheusOperator:
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        kube-state-metrics:
          # The 64Mi limit accumulated 2182 restarts: actual RSS sits
          # around 26Mi, but the 5s liveness probe regularly returned
          # 503 while the host was thrashing on swap, so the kubelet
          # killed the pod. Bump the limit a bit and loosen the probe
          # timing so a slow API server during a swap stall doesn't
          # immediately trigger a restart.
          resources:
            requests:
              memory: 48Mi
              cpu: 10m
            limits:
              memory: 128Mi
          livenessProbe:
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
          readinessProbe:
            timeoutSeconds: 10
            periodSeconds: 30
            failureThreshold: 5
        prometheus-node-exporter:
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        prometheus:
          prometheusSpec:
            retention: 7d
            retentionSize: "4GiB"
            scrapeInterval: 60s
            evaluationInterval: 60s
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            # Bumped from 512Mi to 1.5Gi after Scaphandre joined the
            # scrape set: it emits ~7 metrics per process with high-
            # cardinality pid / cmdline / exe labels for ~500 processes,
            # which pushes Prometheus head series past the previous limit
            # and triggered repeated OOMKills (exitCode 137).
            resources:
              requests:
                memory: 512Mi
                cpu: 50m
              limits:
                memory: 1536Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          persistence:
            enabled: true
            size: 1Gi
          ingress:
            enabled: false
          serviceMonitor:
            enabled: true
          resources:
            requests:
              memory: 96Mi
              cpu: 25m
            limits:
              memory: 192Mi
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-oidc-secret
                key: client_secret
          grafana.ini:
            server:
              root_url: https://metrics.armleth.fr/
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              client_id: grafana
              scopes: "openid profile email groups"
              auth_url: https://auth.armleth.fr/application/o/authorize/
              token_url: https://auth.armleth.fr/application/o/token/
              api_url: https://auth.armleth.fr/application/o/userinfo/
              role_attribute_path: contains(groups[*], 'admin') && 'Admin' || 'Viewer'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-blackbox-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-blackbox-exporter
    targetRevision: 9.0.1
    helm:
      values: |
        resources:
          requests:
            memory: 24Mi
            cpu: 10m
          limits:
            memory: 64Mi
        serviceMonitor:
          enabled: true
        config:
          modules:
            http_2xx:
              prober: http
              timeout: 5s
              http:
                preferred_ip_protocol: ip4
                valid_status_codes: []
            http_2xx_or_3xx:
              prober: http
              timeout: 5s
              http:
                preferred_ip_protocol: ip4
                valid_status_codes: [200, 301, 302, 401, 403]
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scaphandre
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Local fork of upstream chart https://github.com/hubblo-org/scaphandre.git
    # at tag v1.0.2 with the deprecated PodSecurityPolicy (policy/v1beta1)
    # removed, since it was deleted from Kubernetes in 1.25 and is not
    # available in K3s 1.31. Helm's compiled-in scheme always reports
    # `policy/v1beta1` as available, so the chart's API-gated PSP template
    # cannot be skipped via Helm flags alone.
    repoURL: https://github.com/armleth/richelieu.git
    targetRevision: HEAD
    path: k8s/charts/scaphandre
    helm:
      values: |
        image:
          name: hubblo/scaphandre
          tag: "1.0.2"
        resources:
          requests:
            memory: 64Mi
            cpu: 25m
          limits:
            memory: 128Mi
        # Required for Scaphandre to read RAPL counters: container runtimes
        # expose a filtered sysfs view that hides /sys/devices/virtual/powercap
        # from non-privileged pods, so the symlinks under /sys/class/powercap
        # dangle and every power metric reads as 0. Privileged is the
        # standard pattern for power/hardware exporters (node-exporter,
        # cAdvisor, ipmi-exporter all do the same).
        securityContext:
          privileged: true
        serviceMonitor:
          enabled: true
          interval: 60s
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
