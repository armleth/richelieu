apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 66.3.1
    helm:
      values: |
        alertmanager:
          enabled: false
        kubeControllerManager:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubeEtcd:
          enabled: false
        defaultRules:
          rules:
            alertmanager: false
            kubeControllerManager: false
            kubeScheduler: false
            kubeProxy: false
            etcd: false
        prometheusOperator:
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
        kube-state-metrics:
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        prometheus-node-exporter:
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
        prometheus:
          prometheusSpec:
            retention: 7d
            retentionSize: "4GiB"
            scrapeInterval: 60s
            evaluationInterval: 60s
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorSelectorNilUsesHelmValues: false
            probeSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            resources:
              requests:
                memory: 256Mi
                cpu: 50m
              limits:
                memory: 512Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  accessModes: ["ReadWriteOnce"]
                  resources:
                    requests:
                      storage: 5Gi
        grafana:
          persistence:
            enabled: true
            size: 1Gi
          ingress:
            enabled: false
          serviceMonitor:
            enabled: true
          resources:
            requests:
              memory: 96Mi
              cpu: 25m
            limits:
              memory: 192Mi
          dashboardProviders:
            dashboardproviders.yaml:
              apiVersion: 1
              providers:
                - name: default
                  orgId: 1
                  folder: ""
                  type: file
                  disableDeletion: false
                  editable: true
                  options:
                    path: /var/lib/grafana/dashboards/default
          dashboards:
            default:
              scaphandre:
                gnetId: 13845
                revision: 1
                datasource: Prometheus
          envValueFrom:
            GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
              secretKeyRef:
                name: grafana-oidc-secret
                key: client_secret
          grafana.ini:
            server:
              root_url: https://metrics.armleth.fr/
            auth.generic_oauth:
              enabled: true
              name: Authentik
              allow_sign_up: true
              client_id: grafana
              scopes: "openid profile email groups"
              auth_url: https://auth.armleth.fr/application/o/authorize/
              token_url: https://auth.armleth.fr/application/o/token/
              api_url: https://auth.armleth.fr/application/o/userinfo/
              role_attribute_path: contains(groups[*], 'admin') && 'Admin' || 'Viewer'
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus-blackbox-exporter
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: prometheus-blackbox-exporter
    targetRevision: 9.0.1
    helm:
      values: |
        resources:
          requests:
            memory: 24Mi
            cpu: 10m
          limits:
            memory: 64Mi
        serviceMonitor:
          enabled: true
        config:
          modules:
            http_2xx:
              prober: http
              timeout: 5s
              http:
                preferred_ip_protocol: ip4
                valid_status_codes: []
            http_2xx_or_3xx:
              prober: http
              timeout: 5s
              http:
                preferred_ip_protocol: ip4
                valid_status_codes: [200, 301, 302, 401, 403]
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: scaphandre
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/hubblo-org/scaphandre.git
    targetRevision: v1.0.2
    path: helm/scaphandre
    helm:
      values: |
        image:
          name: hubblo/scaphandre
          tag: "1.0.2"
        resources:
          requests:
            memory: 64Mi
            cpu: 25m
          limits:
            memory: 128Mi
        serviceMonitor:
          enabled: true
          interval: 60s
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
