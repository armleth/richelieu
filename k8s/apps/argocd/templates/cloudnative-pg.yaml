apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudnative-pg
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://cloudnative-pg.github.io/charts
    chart: cloudnative-pg
    targetRevision: 0.27.1
    helm:
      values: |
        additionalEnv:
          - name: MALLOC_ARENA_MAX
            value: "2"
        # The default controller-runtime leader-election deadlines
        # (lease=15s, renew=10s, fixed 5s per API request) are too
        # tight for this single-node K3s host: when the VM stalls on
        # swap I/O for more than a couple of seconds the manager loses
        # the lease and self-terminates, which had accumulated ~5800
        # restarts on the operator pod. Stretching the deadlines to
        # 60s / 40s lets the operator ride out short API-server
        # hiccups instead of crash-looping.
        additionalArgs:
          - --leader-lease-duration=60
          - --leader-renew-deadline=40
        resources:
          requests:
            memory: 32Mi
            cpu: 10m
          limits:
            memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
