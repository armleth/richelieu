apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: argocd-application-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-application-controller
          env:
            - name: MALLOC_ARENA_MAX
              value: "2"
          resources:
            requests:
              memory: 192Mi
              cpu: 50m
            limits:
              memory: 384Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-server
spec:
  template:
    spec:
      containers:
        - name: argocd-server
          env:
            - name: MALLOC_ARENA_MAX
              value: "2"
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 128Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-repo-server
spec:
  template:
    spec:
      containers:
        - name: argocd-repo-server
          env:
            - name: MALLOC_ARENA_MAX
              value: "2"
          resources:
            requests:
              memory: 64Mi
              cpu: 25m
            limits:
              memory: 192Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-applicationset-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-applicationset-controller
          env:
            - name: MALLOC_ARENA_MAX
              value: "2"
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-notifications-controller
spec:
  template:
    spec:
      containers:
        - name: argocd-notifications-controller
          env:
            - name: MALLOC_ARENA_MAX
              value: "2"
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: argocd-redis
spec:
  template:
    spec:
      containers:
        - name: redis
          args:
            - --save
            - ""
            - --appendonly
            - "no"
            - --requirepass $(REDIS_PASSWORD)
            - --maxmemory
            - 24mb
            - --maxmemory-policy
            - allkeys-lru
          resources:
            requests:
              memory: 8Mi
              cpu: 10m
            limits:
              memory: 32Mi
