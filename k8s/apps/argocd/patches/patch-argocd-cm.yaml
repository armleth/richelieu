apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
data:
  url: https://argocd.armleth.fr
  accounts.admin.enabled: "true"
  oidc.config: |
    name: Authentik
    issuer: https://auth.armleth.fr/application/o/argocd/
    clientID: argocd
    clientSecret: $argocd-oidc-secret:oidc.authentik.clientSecret
    requestedScopes:
      - openid
      - profile
      - email
      - groups
